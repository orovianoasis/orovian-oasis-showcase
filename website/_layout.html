<!--
OROVIAN OASIS SHOWCASE — SHARED PAGE SHELL
Edit this file for site-wide <head>, header, navigation placement, and footer changes.
Page-specific sections live in the other HTML files in this same website folder.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{PAGE_TITLE}}</title>
  <meta name="description" content="{{PAGE_DESCRIPTION}}">
  <meta property="og:title" content="{{PAGE_TITLE}}">
  <meta property="og:description" content="{{PAGE_DESCRIPTION}}">
  <meta property="og:image" content="{{OG_IMAGE}}">
  <link rel="canonical" href="{{CANONICAL_URL}}">
  <link rel="stylesheet" href="{{ROOT}}css/site.css">
  {{HEAD_EXTRA}}
</head>
<body>
  <header class="site-header"><div class="shell header-row">
    <a class="brand" href="{{ROOT}}"><img src="{{ROOT}}assets/brand/logo.webp" alt="Orovian Oasis"><span>Orovian Oasis Showcase</span></a>
    <nav class="nav" aria-label="Primary">{{NAV}}</nav>
  </div></header>
  <main>{{CONTENT}}</main>
  <footer class="site-footer"><div class="shell">© <span data-year></span> Orovian Oasis · <a href="{{MAIN_SITE_URL}}">Main company website</a></div></footer>
  <script src="{{ROOT}}js/site.js"></script>
</body></html>
