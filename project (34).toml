function perspective(fovy,a,n,f){const t=1/Math.tan(fovy/2),nf=1/(n-f);return[t/a,0,0,0,0,t,0,0,0,0,(f+n)*nf,-1,0,0,2*f*n*nf,0]}
function lookAt(e,c,u){let zx=e[0]-c[0],zy=e[1]-c[1],zz=e[2]-c[2],zl=Math.hypot(zx,zy,zz);zx/=zl;zy/=zl;zz/=zl;let xx=u[1]*zz-u[2]*zy,xy=u[2]*zx-u[0]*zz,xz=u[0]*zy-u[1]*zx,xl=Math.hypot(xx,xy,xz);xx/=xl;xy/=xl;xz/=xl;let yx=zy*xz-zz*xy,yy=zz*xx-zx*xz,yz=zx*xy-zy*xx;return[xx,yx,zx,0,xy,yy,zy,0,xz,yz,zz,0,-(xx*e[0]+xy*e[1]+xz*e[2]),-(yx*e[0]+yy*e[1]+yz*e[2]),-(zx*e[0]+zy*e[1]+zz*e[2]),1]}
function mul(a,b){const o=new Array(16).fill(0);for(let c=0;c<4;c++)for(let r=0;r<4;r++)for(let k=0;k<4;k++)o[c*4+r]+=a[k*4+r]*b[c*4+k];return o}
function update(dt){const sp=((keys.ShiftLeft||keys.ShiftRight||keys.MobileRun)?9:4.2)*dt,turnMode=keys.KeyQ,turnSpeed=1.85*dt,lookSpeed=1.35*dt;if(turnMode){if(keys.ArrowLeft)yaw-=turnSpeed;if(keys.ArrowRight)yaw+=turnSpeed;if(keys.ArrowUp)pitch=Math.min(1.45,pitch+lookSpeed);if(keys.ArrowDown)pitch=Math.max(-1.45,pitch-lookSpeed)}const fx=Math.sin(yaw),fy=Math.cos(yaw),rx=Math.cos(yaw),ry=-Math.sin(yaw);let dx=0,dy=0;if(keys.KeyW||(!turnMode&&keys.ArrowUp)||keys.MobileForward){dx+=fx*sp;dy+=fy*sp}if(keys.KeyS||(!turnMode&&keys.ArrowDown)||keys.MobileBack){dx-=fx*sp;dy-=fy*sp}if(keys.KeyA||(!turnMode&&keys.ArrowLeft)||keys.MobileLeft){dx-=rx*sp;dy-=ry*sp}if(keys.KeyD||(!turnMode&&keys.ArrowRight)||keys.MobileRight){dx+=rx*sp;dy+=ry*sp}let nx=pos[0]+dx,ny=pos[1]+dy,nz=pos[2];if(fly){if(keys.Space||keys.MobileRise)nz+=sp;if(keys.KeyC||keys.ControlLeft||keys.ControlRight||keys.MobileLower)nz-=sp}else nz=floorZ(nx,ny,pos[2]);if(!collides(nx,pos[1],nz))pos[0]=nx;if(!collides(pos[0],ny,nz))pos[1]=ny;pos[2]=nz;window.__walkthroughState={pos:pos.slice(),fly,showRoof,showUpper,fov}}
function drawSet(set){gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,set.buffer);gl.drawElements(gl.TRIANGLES,set.count,itype,0)}function drawRanges(){drawSet(ibMain);if(showUpper)drawSet(ibUpper);if(showRoof)drawSet(ibRoof)}
function frame(t){resize();const dt=Math.min(.05,(t-last)/1000);last=t;update(dt);gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);const dir=[Math.sin(yaw)*Math.cos(pitch),Math.cos(yaw)*Math.cos(pitch),Math.sin(pitch)],v=lookAt(pos,[pos[0]+dir[0],pos[1]+dir[1],pos[2]+dir[2]],[0,0,1]),p=perspective(fov*Math.PI/180,canvas.width/canvas.height,.05,500),m=mul(p,v);gl.uniformMatrix4fv(locM,false,new Float32Array(m));drawRanges();requestAnimationFrame(frame)}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function status(){document.getElementById('status').textContent=(fly?'Fly mode':'Walk mode')+' • '+(showRoof?'Roof visible':'Roof hidden')+' • '+(showUpper?'Upper slabs visible':'Upper slabs hidden')+' • Zoom '+Math.round(fov)+'°';const fb=document.getElementById('flyBtn'),rise=document.getElementById('riseBtn'),lower=document.getElementById('lowerBtn'),roof=document.getElementById('roofBtn'),upper=document.getElementById('upperBtn');fb.textContent='FLY';fb.classList.toggle('modeActive',fly);fb.classList.toggle('flyMode',fly);fb.setAttribute('aria-pressed',fly?'true':'false');for(const b of[rise,lower]){b.disabled=!fly;b.setAttribute('aria-disabled',fly?'false':'true');b.classList.toggle('available',fly);if(!fly)b.classList.remove('active')}if(!fly){keys.MobileRise=false;keys.MobileLower=false}roof.classList.toggle('toggleOn',showRoof);roof.setAttribute('aria-pressed',showRoof?'true':'false');upper.classList.toggle('toggleOn',showUpper);upper.setAttribute('aria-pressed',showUpper?'true':'false')}
function resetView(){pos=data.start.position.slice();yaw=data.start.yaw;pitch=data.start.pitch;fov=data.start.fov;fly=false;status()}function exteriorView(){pos=data.exterior.position.slice();yaw=data.exterior.yaw;pitch=data.exterior.pitch;fov=data.exterior.fov;fly=true;status()}function toggleFly(){fly=!fly;status()}function toggleRoof(){showRoof=!showRoof;status()}function toggleUpper(){showUpper=!showUpper;status()}function adjustZoom(delta){fov=clamp(fov+delta,34,100);status()}
const coarse=matchMedia('(pointer:coarse)').matches||navigator.maxTouchPoints>0,enterBtn=document.getElementById('enter'),uiCard=document.getElementById('ui'),toggleUIBtn=document.getElementById('toggleUI'),toggleToolsBtn=document.getElementById('toggleTools'),mobileActions=document.getElementById('mobileActions');function syncUIBtn(){const hidden=uiCard.classList.contains('hidden');toggleUIBtn.textContent=hidden?'INFO OFF':'INFO ON';toggleUIBtn.classList.toggle('active',!hidden);toggleUIBtn.setAttribute('aria-pressed',hidden?'true':'false')}function toggleUI(){uiCard.classList.toggle('hidden');syncUIBtn()}function syncToolsBtn(){const hidden=mobileActions.classList.contains('hidden');toggleToolsBtn.textContent=hidden?'TOOLS OFF':'TOOLS ON';toggleToolsBtn.classList.toggle('active',!hidden);toggleToolsBtn.setAttribute('aria-pressed',hidden?'true':'false')}function toggleTools(){mobileActions.classList.toggle('hidden');syncToolsBtn()}toggleUIBtn.addEventListener('click',e=>{e.preventDefault();toggleUI()});toggleToolsBtn.addEventListener('click',e=>{e.preventDefault();toggleTools()});syncUIBtn();syncToolsBtn();enterBtn.onclick=()=>canvas.requestPointerLock&&canvas.requestPointerLock();canvas.addEventListener('click',()=>{if(!coarse&&canvas.requestPointerLock)canvas.requestPointerLock()});
const blockedKeys=new Set(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyQ']);addEventListener('keydown',e=>{if(blockedKeys.has(e.code))e.preventDefault();keys[e.code]=true;if(e.repeat)return;if(e.code==='KeyF')toggleFly();if(e.code==='KeyE')exteriorView();if(e.code==='KeyR')toggleRoof();if(e.code==='KeyU')toggleUpper();if(e.code==='KeyX')resetView();if(e.code==='KeyI')toggleUI();if(e.code==='KeyT')toggleTools()},{passive:false});addEventListener('keyup',e=>{if(blockedKeys.has(e.code))e.preventDefault();keys[e.code]=false},{passive:false});addEventListener('blur',()=>{for(const k in keys)keys[k]=false});addEventListener('mousemove',e=>{if(document.pointerLockElement===canvas){yaw-=e.movementX*.0022;pitch-=e.movementY*.0022;pitch=clamp(pitch,-1.45,1.45)}});canvas.addEventListener('wheel',e=>{e.preventDefault();adjustZoom(e.deltaY*.035)},{passive:false});
function bindHold(id,key){const el=document.getElementById(id);let pointer=null;const down=e=>{if(el.disabled)return;e.preventDefault();pointer=e.pointerId;el.setPointerCapture?.(pointer);keys[key]=true;el.classList.add('active')};const up=e=>{if(pointer!==null&&e.pointerId!==pointer)return;e.preventDefault();keys[key]=false;el.classList.remove('active');pointer=null};el.addEventListener('pointerdown',down,{passive:false});el.addEventListener('pointerup',up,{passive:false});el.addEventListener('pointercancel',up,{passive:false});el.addEventListener('lostpointercapture',()=>{keys[key]=false;el.classList.remove('active');pointer=null})}bindHold('moveForward','MobileForward');bindHold('moveBack','MobileBack');bindHold('moveLeft','MobileLeft');bindHold('moveRight','MobileRight');bindHold('runBtn','MobileRun');bindHold('riseBtn','MobileRise');bindHold('lowerBtn','MobileLower');function bindTap(id,fn){const el=document.getElementById(id);el.addEventListener('pointerdown',e=>{e.preventDefault();el.classList.add('active')},{passive:false});el.addEventListener('pointerup',e=>{e.preventDefault();el.classList.remove('active');fn()},{passive:false});el.addEventListener('pointercancel',()=>el.classList.remove('active'))}bindTap('flyBtn',toggleFly);bindTap('exteriorBtn',exteriorView);bindTap('roofBtn',toggleRoof);bindTap('upperBtn',toggleUpper);bindTap('resetBtn',resetView);
const sceneTouches=new Map();let lastPinchDistance=null;function touchDistance(){const pts=[...sceneTouches.values()];if(pts.length<2)return null;return Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y)}canvas.addEventListener('pointerdown',e=>{if(e.pointerType==='mouse')return;e.preventDefault();sceneTouches.set(e.pointerId,{x:e.clientX,y:e.clientY});canvas.setPointerCapture?.(e.pointerId);lastPinchDistance=touchDistance()},{passive:false});canvas.addEventListener('pointermove',e=>{if(!sceneTouches.has(e.pointerId))return;e.preventDefault();const old=sceneTouches.get(e.pointerId);sceneTouches.set(e.pointerId,{x:e.clientX,y:e.clientY});if(sceneTouches.size===1){yaw-= (e.clientX-old.x)*.006;pitch=clamp(pitch-(e.clientY-old.y)*.006,-1.45,1.45)}else{const d=touchDistance();if(lastPinchDistance!==null&&d!==null)adjustZoom((lastPinchDistance-d)*.075);lastPinchDistance=d}},{passive:false});function endLook(e){sceneTouches.delete(e.pointerId);lastPinchDistance=touchDistance()}canvas.addEventListener('pointerup',endLook);canvas.addEventListener('pointercancel',endLook);canvas.addEventListener('lostpointercapture',endLook);status();window.__walkthroughReady=true;requestAnimationFrame(frame);
}catch(err){const e=document.getElementById('error');e.style.display='block';e.textContent=String(err&&err.stack||err);console.error(err)}
</script></body></html>