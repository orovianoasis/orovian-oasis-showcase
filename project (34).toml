<div id="ui"><b>Sable Meridian House — Walkthrough Controls</b><br><b>Move:</b> Arrow keys/WASD or the centered mobile D-pad. Hold <b>Q</b> with arrows to turn/look; mouse or one-finger drag also looks.<br><b>Walk:</b> follows the estate floors, landings, and sculptural stair. <b>Fly:</b> unlocks vertical movement. Use <b>UP/DOWN</b> only while flying; <b>EXTERIOR</b> jumps to an aerial view.<br><b>Roof / Slabs:</b> show or hide those model groups. <b>Reset:</b> returns to the south arrival gallery. Mouse wheel or pinch zooms.<br>Desktop: Shift run • F fly • E exterior • Space/C altitude • R roof • U slabs • X reset • I info • T tools.<br><button id="enter">Enter Walkthrough</button><div id="status">Walk mode • Roof visible • Upper slabs visible • Zoom 70°</div></div>
